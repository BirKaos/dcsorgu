<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord ID Lookup</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
        }
        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            background-color: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: #5865F2;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #4752c4; }
        .result { margin-top: 20px; display: none; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #5865F2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Discord ID Sorgula</h2>
    <input type="text" id="userId" placeholder="Discord Kullanıcı ID Girin...">
    <br>
    <button onclick="sorgula()">Sorgula</button>

    <div class="result" id="resultBox">
        <img id="userAvatar" class="avatar" src="" alt="Avatar">
        <h3 id="userName">Kullanıcı Adı</h3>
        <p id="userTag"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
  </html>

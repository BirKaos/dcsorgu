<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Lookup Pro</title>
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #131926;
            --accent: #5865F2;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1e293b;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .search-section { text-align: center; max-width: 500px; width: 100%; margin-bottom: 25px; }
        .title { font-size: 2rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }

        .input-wrapper {
            display: flex; align-items: center; background: #182030;
            border: 2px solid var(--border); border-radius: 50px; padding: 6px 12px; margin-bottom: 15px;
        }
        .input-wrapper input { background: transparent; border: none; outline: none; color: white; font-size: 1rem; width: 100%; }
        .search-btn { background: white; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-weight: bold; }

        /* Profil Kartı Tasarımı */
        .result-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px;
            width: 100%; max-width: 450px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none;
        }

        /* Banner Alanı */
        .banner-area { height: 120px; background: #5865F2; background-size: cover; background-position: center; position: relative; }

        .profile-header { padding: 0 24px; position: relative; margin-top: -45px; margin-bottom: 15px; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 5px solid var(--card-bg); background: #2c3e50; object-fit: cover; }
        
        .badge-container { position: absolute; right: 24px; bottom: 10px; display: flex; gap: 8px; }
        .badge-icon { width: 22px; height: 22px; }

        .profile-names { padding: 0 24px; }
        .profile-names h2 { margin: 0; font-size: 1.5rem; }
        .profile-names p { margin: 4px 0; color: var(--text-muted); font-size: 0.95rem; }

        .section-title { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; padding: 15px 24px 5px 24px; border-top: 1px solid var(--border); margin-top: 15px; }
        .details-list { padding: 0 24px 15px 24px; }
        .detail-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 500; }

        /* Çalışan Yazılımlar Sekmesi */
        .activity-box { background: #182030; margin: 10px 24px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: none; }
        .activity-title { font-weight: bold; font-size: 0.9rem; color: #34d399; margin-bottom: 4px; }
        .activity-desc { font-size: 0.85rem; color: var(--text-main); }

        .json-wrapper { background: #090d16; border-radius: 12px; margin: 15px 24px; padding: 12px; font-family: monospace; font-size: 0.8rem; color: #34d399; overflow-x: auto; max-height: 150px; text-align: left; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="search-section">
    <div class="title">Discord Lookup Pro</div>
    <div class="subtitle">API Bağlantılı Detaylı Kullanıcı Sorgulama Sistemi</div>

    <div class="input-wrapper">
        <input type="text" id="targetId" placeholder="Discord Kullanıcı ID girin (Örn: 1209910370341224450)...">
        <button class="search-btn" onclick="executeLookup()">↑</button>
    </div>
</div>

<div class="result-card" id="resultCard">
    <!-- Banner -->
    <div id="resBanner" class="banner-area"></div>

    <div class="profile-header">
        <img id="resAvatar" class="avatar" src="" alt="Avatar">
        <!-- Rozetler -->
        <div id="resBadges" class="badge-container"></div>
    </div>

    <div class="profile-names">
        <h2 id="resName">Yükleniyor...</h2>
        <p id="resSubname">@username</p>
    </div>

    <!-- Aktif Yazılımlar / Oyunlar -->
    <div class="section-title">Aktif Yazılım / Durum</div>
    <div id="activityBox" class="activity-box">
        <div id="actTitle" class="activity-title">Oynuyor: VS Code</div>
        <div id="actDesc" class="activity-desc">script.js düzenleniyor...</div>
    </div>

    <!-- Hesap Detayları -->
    <div class="section-title">Kullanıcı Detayları</div>
    <div class="details-list">
        <div class="detail-item"><div class="detail-label">Kullanıcı ID</div><div class="detail-value" id="resId">-</div></div>
        <div class="detail-item"><div class="detail-label">Hesap Kuruluş Tarihi</div><div class="detail-value" id="resDate">-</div></div>
        <div class="detail-item"><div class="detail-label">Nitro Durumu</div><div class="detail-value" id="resNitro">Aktif Değil veya Gizli</div></div>
    </div>

    <div class="json-wrapper">
        <pre id="jsonOutput"></pre>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
